<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Image Gallery</title>
        <link rel="stylesheet" href="ImageGallery.css">
    </head>
    <body>
<h1>Image Gallery</h1>

<div class="filter-buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="https://picsum.photos/300/200?1" onclick="openLightbox(this.src)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/300/200?2" onclick="openLightbox(this.src)">
    </div>

    <div class="image nature">
        <img src="https://picsum.photos/300/200?3" onclick="openLightbox(this.src)">
    </div>

    <div class="image city">
        <img src="https://picsum.photos/300/200?4" onclick="openLightbox(this.src)">
    </div>

</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script src="script.js"></script>
    </body>
    </html>
